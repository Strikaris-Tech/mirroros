# examples/accounting_demo/demo_config.toml
# Configuration for the MirrorOS accounting governance demo.
#
# This file drives run_demo.py.  Edit pulse sequences, approval limits,
# or vendor lists here without touching any Python or Prolog.

[demo]
name        = "Accounting Approval Workflow"
description = """
LedgerLark governs an accounting workflow.  Two agents — clerk and auditor —
attempt a series of actions.  MRS evaluates each one against the Codex and
accounting compliance rules.  Every decision is sealed in immudb in real-time.
"""
compliance_module = "examples/accounting_demo/accounting_compliance.pl"

[immudb]
host     = "localhost"
port     = 3322
username = "immudb"
password = "immudb"
database = "defaultdb"
# Set to false to run demo without immudb (decisions still logged to JSON)
enabled  = true

# ── INVOICES ──────────────────────────────────────────────────────────────────
# Invoice data used during the demo.  Matches mock_accounting.py defaults.

[[invoices]]
id     = "inv_001"
vendor = "acme_corp"
amount = 200
note   = "Office supplies — within clerk authority"

[[invoices]]
id     = "inv_002"
vendor = "trusted_supplier"
amount = 25000
note   = "Annual service contract — exceeds clerk authority"

[[invoices]]
id     = "inv_003"
vendor = "unknown_co"
amount = 500
note   = "Unknown vendor — will be rejected regardless of amount"

[[invoices]]
id     = "inv_004"
vendor = "acme_corp"
amount = 950
note   = "Near-limit purchase — within clerk authority (limit: 1000)"

# ── APPROVAL LIMITS ───────────────────────────────────────────────────────────
# Must match accounting_compliance.pl approval_limit/2 facts.

[limits]
clerk   = 1000
auditor = 50000

# ── VERIFIED VENDORS ──────────────────────────────────────────────────────────
# Must match accounting_compliance.pl vendor_verified/1 facts.

[vendors]
approved = ["acme_corp", "trusted_supplier", "city_utilities"]
rejected = ["unknown_co"]

# ── DEMO PULSE SEQUENCE ───────────────────────────────────────────────────────
# Each pulse defines one governed action.
# expected: "PERMITTED" or "REJECTED" — used for result validation.
# why: explanation shown in demo output.

[[pulses]]
agent      = "clerk"
action     = "approve_invoice"
invoice_id = "inv_001"
expected   = "PERMITTED"
why        = "inv_001 is $200 — within clerk approval limit of $1,000"

[[pulses]]
agent      = "clerk"
action     = "approve_invoice"
invoice_id = "inv_002"
expected   = "REJECTED"
why        = "inv_002 is $25,000 — exceeds clerk approval limit of $1,000"

[[pulses]]
agent      = "clerk"
action     = "pay_vendor"
vendor_id  = "unknown_co"
amount     = 500
expected   = "REJECTED"
why        = "unknown_co is not in the approved vendor registry"

[[pulses]]
agent      = "auditor"
action     = "approve_invoice"
invoice_id = "inv_002"
expected   = "PERMITTED"
why        = "inv_002 is $25,000 — within auditor approval limit of $50,000"

[[pulses]]
agent      = "auditor"
action     = "compliance_check"
expected   = "PERMITTED"
why        = "Read-only compliance summary — always permitted"
